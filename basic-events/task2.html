<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Events: Task 2</title>
    <style>
      p {
        color: purple;
        margin: 0.5em 0;
      }

      * {
        box-sizing: border-box;
      }

      canvas {
        border: 1px solid black;
      }
    </style>
  </head>

  <body>
    <section class="preview"></section>

    <canvas width="480" height="320" tabindex="0"> </canvas>

    <script>
      const canvas = document.querySelector("canvas");
      const ctx = canvas.getContext("2d");

      function drawCircle(x, y, size) {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.beginPath();
        ctx.fillStyle = "black";
        ctx.arc(x, y, size, 0, 2 * Math.PI);
        ctx.fill();
      }

      function onKeyEntered(e) {
        console.log(e);
        switch (e.key) {
          case "W":
            y -= 10;
            drawCircle(x, y, size);
            break;
          case "A":
            x -= 10;
            drawCircle(x, y, size);
            break;
          case "S":
            y += 10;
            drawCircle(x, y, size);
            break;
          case "D":
            x += 10;
            drawCircle(x, y, size);
            break;
          default:
            drawCircle(x, y, size);
        }
      }

      let x = 50;
      let y = 50;
      const size = 30;

      drawCircle(x, y, size);

      canvas.addEventListener("keydown", onKeyEntered);

      // Add your code here
    </script>
  </body>
</html>
