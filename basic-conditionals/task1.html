<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Conditionals: Task 1</title>
    <style>
      p {
        color: purple;
        margin: 0.5em 0;
      }

      * {
        box-sizing: border-box;
      }
    </style>
    <link rel="stylesheet" href="../styles.css" />
  </head>

  <body>
    <section class="preview"></section>
  </body>

  <script>
    let season = "summer";
    let response;

    // Add your code here

    switch (season) {
      case "summer":
        response = "It is summer, which is a beautiful, WARM season.";
        break;
      case "winter":
        response = "It is winter. Think about snowmans, carrots, and Christmas.";
        break;
      default:
        response = "Unfortunately, we could not recognize what season it is.";
    }

    // Don't edit the code below here!

    const section = document.querySelector("section");

    let para1 = document.createElement("p");
    para1.textContent = response;
    section.appendChild(para1);
  </script>
</html>
